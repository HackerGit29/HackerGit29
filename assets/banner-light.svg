    <a href="https://linkedin.com/in/ben-mombouli" target="_blank"><rect x="1036" y="518" width="94" height="34" rx="17" fill="url(#accent)" fill-opacity=".08" stroke="url(#accent)" stroke-opacity=".48"/><text x="1083" y="540" text-anchor="middle" class="mono primary" font-size="11.5" font-weight="800">LinkedIn</text></a>
