    <text x="496" y="101" class="mono primary" font-size="23" font-weight="800" clip-path="url(#typeClip)">Salut, je suis Ben Mombouli</text>
    <rect x="914" y="81" width="2.5" height="21" fill="#06B6D4"><animate attributeName="opacity" values="1;0;1" dur=".9s" repeatCount="indefinite"/><animate attributeName="x" values="496;496;914" keyTimes="0;.25;1" dur="1.6s" begin=".45s" fill="freeze"/></rect>

    <text x="496" y="136" class="mono" font-size="16.5" fill="#06B6D4">&gt;<tspan dx="7" class="primary">
      <tspan opacity="0">Développeur IA orienté produit<animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.03;.17;.20" dur="22s" repeatCount="indefinite"/></tspan>
      <tspan opacity="0">Applied AI Builder<animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.23;.37;.40" dur="22s" repeatCount="indefinite"/></tspan>
      <tspan opacity="0">Cloud-native App Developer<animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.43;.57;.60" dur="22s" repeatCount="indefinite"/></tspan>
      <tspan opacity="0">Automation Systems Designer<animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.63;.77;.80" dur="22s" repeatCount="indefinite"/></tspan>
      <tspan opacity="0">Product-first Engineer<animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.83;.97;1" dur="22s" repeatCount="indefinite"/></tspan>
    </tspan></text>
    <line x1="496" y1="160" x2="1130" y2="160" stroke="rgba(15,23,42,.08)"/>

    <g class="mono" font-size="13.2">
      <g opacity="0"><animate attributeName="opacity" values="0;1" begin="1.9s" dur=".35s" fill="freeze"/><rect x="496" y="174" width="24" height="24" rx="8" class="tile"/><image href="icons/location.svg" x="501" y="179" width="14" height="14"/><text x="532" y="191" class="muted"><tspan class="primary">Location:</tspan> Douala, Cameroun</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" begin="2.2s" dur=".35s" fill="freeze"/><rect x="496" y="201" width="24" height="24" rx="8" class="tile"/><image href="icons/education.svg" x="501" y="206" width="14" height="14"/><text x="532" y="218" class="muted"><tspan class="primary">Profil:</tspan> Développeur IA orienté produit</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" begin="2.5s" dur=".35s" fill="freeze"/><rect x="496" y="228" width="24" height="24" rx="8" class="tile"/><image href="icons/focus.svg" x="501" y="233" width="14" height="14"/><text x="532" y="245" class="muted"><tspan class="primary">Focus:</tspan> IA appliquée, automatisation, cloud-native</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" begin="2.8s" dur=".35s" fill="freeze"/><rect x="496" y="255" width="24" height="24" rx="8" class="tile"/><image href="icons/portfolio.svg" x="501" y="260" width="14" height="14"/><text x="532" y="272" class="muted"><tspan class="primary">GitHub:</tspan> github.com/HackerGit29</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" begin="3.1s" dur=".35s" fill="freeze"/><rect x="496" y="282" width="24" height="24" rx="8" class="tile"/><image href="icons/email.svg" x="501" y="287" width="14" height="14"/><text x="532" y="299" class="muted"><tspan class="primary">Email:</tspan> benji-akadev@outlook.fr</text></g>
    </g>

    <line x1="496" y1="320" x2="1130" y2="320" stroke="rgba(15,23,42,.08)"/>
    <text x="496" y="345" class="mono faint" font-size="12" letter-spacing="2">TECH STACK</text>
    <g class="mono" font-size="10.2" font-weight="700" fill="#0F172A">
      <g opacity="0"><animate attributeName="opacity" values="0;1" begin="3.35s" dur=".35s" fill="freeze"/><rect x="496" y="360" width="72" height="55" rx="16" class="tile"/><image href="tech/typescript.svg" x="518" y="369" width="27" height="27"/><text x="532" y="405" text-anchor="middle">TypeScript</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" begin="3.48s" dur=".35s" fill="freeze"/><rect x="578" y="360" width="72" height="55" rx="16" class="tile"/><image href="tech/react.svg" x="600" y="369" width="27" height="27"/><text x="614" y="405" text-anchor="middle">React</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" begin="3.61s" dur=".35s" fill="freeze"/><rect x="660" y="360" width="72" height="55" rx="16" class="tile"/><image href="tech/javascript.svg" x="682" y="369" width="27" height="27"/><text x="696" y="405" text-anchor="middle">JavaScript</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" begin="3.74s" dur=".35s" fill="freeze"/><rect x="742" y="360" width="72" height="55" rx="16" class="tile"/><image href="tech/azure.svg" x="764" y="369" width="27" height="27"/><text x="778" y="405" text-anchor="middle">Azure</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" begin="3.87s" dur=".35s" fill="freeze"/><rect x="824" y="360" width="72" height="55" rx="16" class="tile"/><image href="tech/docker.svg" x="846" y="369" width="27" height="27"/><text x="860" y="405" text-anchor="middle">Docker</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" begin="4.00s" dur=".35s" fill="freeze"/><rect x="906" y="360" width="86" height="55" rx="16" class="tile"/><image href="tech/github-actions.svg" x="936" y="369" width="27" height="27"/><text x="949" y="405" text-anchor="middle">Actions</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" begin="4.13s" dur=".35s" fill="freeze"/><rect x="1002" y="360" width="72" height="55" rx="16" class="tile"/><image href="tech/terraform.svg" x="1024" y="369" width="27" height="27"/><text x="1038" y="405" text-anchor="middle">Terraform</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" begin="4.26s" dur=".35s" fill="freeze"/><rect x="1084" y="360" width="46" height="55" rx="16" class="tile"/><image href="tech/figma.svg" x="1094" y="369" width="27" height="27"/><text x="1107" y="405" text-anchor="middle">UX</text></g>
